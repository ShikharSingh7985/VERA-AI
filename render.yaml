services:
  - type: web
    name: vera-signal-engine
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: USE_LLM
        value: true

